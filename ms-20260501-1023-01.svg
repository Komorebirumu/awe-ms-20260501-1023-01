<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" aria-label="AI-Driven Niche Historical Cartography Recreation Engine">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c6ff; stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa" />

  <!-- Central AI Core -->
  <g transform="translate(400, 300)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="80" fill="url(#grad1)" />
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">AI</text>
  </g>

  <!-- Data Streams (representing historical data input) -->
  <g stroke="#6c757d" stroke-width="3" fill="none" opacity="0.8">
    <!-- Top Left -->
    <path d="M150,100 Q250,50 350,100" />
    <circle cx="150" cy="100" r="8" fill="#ced4da" />
    <circle cx="350" cy="100" r="8" fill="#ced4da" />
    <path d="M120,120 L180,180" />
    <circle cx="120" cy="120" r="8" fill="#ced4da" />
    <circle cx="180" cy="180" r="8" fill="#ced4da" />

    <!-- Top Right -->
    <path d="M650,100 Q550,50 450,100" />
    <circle cx="650" cy="100" r="8" fill="#ced4da" />
    <circle cx="450" cy="100" r="8" fill="#ced4da" />
    <path d="M680,120 L620,180" />
    <circle cx="680" cy="120" r="8" fill="#ced4da" />
    <circle cx="620" cy="180" r="8" fill="#ced4da" />

    <!-- Bottom Left -->
    <path d="M150,500 Q250,550 350,500" />
    <circle cx="150" cy="500" r="8" fill="#ced4da" />
    <circle cx="350" cy="500" r="8" fill="#ced4da" />
    <path d="M120,480 L180,420" />
    <circle cx="120" cy="480" r="8" fill="#ced4da" />
    <circle cx="180" cy="420" r="8" fill="#ced4da" />

    <!-- Bottom Right -->
    <path d="M650,500 Q550,550 450,500" />
    <circle cx="650" cy="500" r="8" fill="#ced4da" />
    <circle cx="450" cy="500" r="8" fill="#ced4da" />
    <path d="M680,480 L620,420" />
    <circle cx="680" cy="480" r="8" fill="#ced4da" />
    <circle cx="620" cy="420" r="8" fill="#ced4da" />
  </g>

  <!-- Cartography Icons/Elements (representing historical maps) -->
  <g fill="#adb5bd" stroke="#495057" stroke-width="2" transform="translate(250, 180) scale(0.8)">
    <!-- Compass Rose -->
    <path d="M0 0 L10 40 L-10 40 L0 0z" transform="translate(0, -30) rotate(-45)" />
    <line x1="0" y1="-30" x2="0" y2="30" />
    <line x1="-30" y1="0" x2="30" y2="0" />
    <circle cx="0" cy="0" r="5" />
  </g>

  <g fill="#adb5bd" stroke="#495057" stroke-width="2" transform="translate(550, 180) scale(0.8)">
    <!-- Stylized Map Outline -->
    <path d="M-30 -40 L30 -40 L40 0 L30 40 L-30 40 L-40 0 Z" />
    <circle cx="0" cy="0" r="8" fill="#e9ecef" />
  </g>

  <g fill="#adb5bd" stroke="#495057" stroke-width="2" transform="translate(250, 420) scale(0.8)">
    <!-- Simple Landmark Icon -->
    <rect x="-15" y="-25" width="30" height="30" rx="5" />
    <line x1="0" y1="-25" x2="0" y2="-35" stroke-width="3"/>
  </g>

  <g fill="#adb5bd" stroke="#495057" stroke-width="2" transform="translate(550, 420) scale(0.8)">
    <!-- Grid Lines -->
    <path d="M-30 -40 h60" />
    <path d="M-30 -20 h60" />
    <path d="M-30 0 h60" />
    <path d="M-30 20 h60" />
    <path d="M-30 40 h60" />
    <path d="M-40 -30 v60" />
    <path d="M-20 -30 v60" />
    <path d="M0 -30 v60" />
    <path d="M20 -30 v60" />
    <path d="M40 -30 v60" />
  </g>

  <!-- Text Labels -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#343a40" font-weight="bold">AI-Driven Niche Historical Cartography Recreation Engine</text>
  <text x="150" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6c757d">Historical Data</text>
  <text x="650" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6c757d">Historical Data</text>
  <text x="150" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6c757d">Historical Data</text>
  <text x="650" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6c757d">Historical Data</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Processing</text>

</svg>